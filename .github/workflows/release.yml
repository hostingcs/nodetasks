name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies (root + workspaces)
        run: npm ci --ignore-scripts=false

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"

      - name: Sync version into neutralino.config.json and package.json
        shell: bash
        env:
          V: ${{ steps.version.outputs.version }}
        run: |
          node -e "const fs=require('fs'); for(const p of ['apps/desktop/neutralino.config.json','apps/desktop/package.json','package.json']){const c=JSON.parse(fs.readFileSync(p,'utf8'));c.version=process.env.V;fs.writeFileSync(p, JSON.stringify(c,null,2)+'\n');}"

      - name: Install Neutralino binaries
        working-directory: apps/desktop
        run: npx --yes @neutralinojs/neu update

      - name: Build release
        working-directory: apps/desktop
        run: npx --yes @neutralinojs/neu build --release

      - name: Bundle resources.neu into standalone .exe
        shell: bash
        run: |
          cd apps/desktop/dist/NodeTasks
          # Appending resources.neu as PE overlay makes the .exe standalone.
          # Neutralino's loader prefers a sidecar resources.neu (which the
          # auto-updater writes), otherwise falls back to the overlay bytes.
          cat resources.neu >> NodeTasks-win_x64.exe
          mv NodeTasks-win_x64.exe NodeTasks.exe
          ls -la NodeTasks.exe resources.neu

      # NOTE: Embedding a custom .exe file icon via resedit breaks Neutralino's
      # overlay-based resource detection. Deferred until we move to a tool that
      # preserves PE overlay bytes (e.g., rcedit on a Windows runner).

      - name: Install NSIS
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nsis

      - name: Build Windows installer
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cp apps/desktop/dist/NodeTasks/NodeTasks.exe installer/NodeTasks.exe
          cp apps/desktop/resources/icons/icon.ico installer/icon.ico
          cd installer
          makensis -V2 -DVERSION="$VERSION" nodetasks.nsi
          ls -la NodeTasks-Setup.exe

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release
          cp apps/desktop/dist/NodeTasks/NodeTasks.exe release/
          cp apps/desktop/dist/NodeTasks/resources.neu release/
          cp installer/NodeTasks-Setup.exe release/
          ls -la release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: NodeTasks ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            release/NodeTasks-Setup.exe
            release/NodeTasks.exe
            release/resources.neu
