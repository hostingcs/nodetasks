name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies (root + workspaces)
        run: npm ci --ignore-scripts=false

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"

      - name: Sync version into neutralino.config.json and package.json
        shell: bash
        env:
          V: ${{ steps.version.outputs.version }}
        run: |
          node -e "const fs=require('fs'); for(const p of ['apps/desktop/neutralino.config.json','apps/desktop/package.json','package.json']){const c=JSON.parse(fs.readFileSync(p,'utf8'));c.version=process.env.V;fs.writeFileSync(p, JSON.stringify(c,null,2)+'\n');}"

      - name: Install Neutralino binaries
        working-directory: apps/desktop
        run: npx --yes @neutralinojs/neu update

      - name: Build release
        working-directory: apps/desktop
        run: npx --yes @neutralinojs/neu build --release

      - name: Rename base exe for consistent naming
        shell: bash
        run: |
          cd apps/desktop/dist/NodeTasks
          mv NodeTasks-win_x64.exe NodeTasks.exe
          ls -la NodeTasks.exe resources.neu

      - name: Install NSIS
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nsis

      - name: Build Windows installer
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cp apps/desktop/dist/NodeTasks/NodeTasks.exe installer/NodeTasks.exe
          cp apps/desktop/dist/NodeTasks/resources.neu installer/resources.neu
          cp apps/desktop/resources/icons/icon.ico installer/icon.ico
          cd installer
          makensis -V2 -DVERSION="$VERSION" nodetasks.nsi
          ls -la NodeTasks-Setup.exe

      - name: Build portable ZIP
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Stage into a NodeTasks/ subfolder so Windows "Extract All" produces
          # a clearly-named directory. If we leave both files at the zip root,
          # double-clicking NodeTasks.exe inside Explorer's zip viewer extracts
          # only that file to temp, leaving resources.neu behind — which lands
          # the user on Neutralino's default welcome page.
          cd apps/desktop/dist/NodeTasks
          rm -rf stage
          mkdir -p stage/NodeTasks
          cp NodeTasks.exe resources.neu stage/NodeTasks/
          cat > stage/NodeTasks/README.txt <<EOF
          NodeTasks $VERSION — portable distribution

          EXTRACT THIS FOLDER BEFORE RUNNING.

          Double-clicking NodeTasks.exe from inside a ZIP will not work —
          NodeTasks.exe needs resources.neu in the same folder.

          1. Right-click the ZIP and choose "Extract All..."
          2. Open the extracted NodeTasks folder
          3. Double-click NodeTasks.exe

          Website: https://nodetasks.com
          Repo:    https://github.com/hostingcs/nodetasks
          License: MIT
          EOF
          ( cd stage && zip -r ../NodeTasks-portable.zip NodeTasks/ )
          ls -la NodeTasks-portable.zip

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release
          cp installer/NodeTasks-Setup.exe release/
          cp apps/desktop/dist/NodeTasks/NodeTasks-portable.zip release/
          cp apps/desktop/dist/NodeTasks/resources.neu release/
          ls -la release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: NodeTasks ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            release/NodeTasks-Setup.exe
            release/NodeTasks-portable.zip
            release/resources.neu

      - name: Publish updater manifest on main
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Drop uncommitted changes from the version-sync step so we only push
          # the manifest update back to main.
          git checkout -- .
          git fetch origin main
          git checkout main
          git pull --ff-only
          cat > manifest.json <<EOF
          {
            "applicationId": "app.nodetasks.monitor",
            "version": "$VERSION",
            "resourcesURL": "https://github.com/hostingcs/nodetasks/releases/download/v$VERSION/resources.neu"
          }
          EOF
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add manifest.json
          if git diff --staged --quiet; then
            echo "manifest already up-to-date"
          else
            git commit -m "chore: update manifest to v$VERSION"
            git push origin main
          fi
