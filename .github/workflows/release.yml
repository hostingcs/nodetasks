name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies (root + workspaces)
        run: npm ci --ignore-scripts=false

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"

      - name: Sync version into neutralino.config.json and package.json
        shell: bash
        env:
          V: ${{ steps.version.outputs.version }}
        run: |
          node -e "const fs=require('fs'); for(const p of ['apps/desktop/neutralino.config.json','apps/desktop/package.json','package.json']){const c=JSON.parse(fs.readFileSync(p,'utf8'));c.version=process.env.V;fs.writeFileSync(p, JSON.stringify(c,null,2)+'\n');}"

      - name: Install Neutralino binaries
        working-directory: apps/desktop
        run: npx --yes @neutralinojs/neu update

      - name: Build release
        working-directory: apps/desktop
        run: npx --yes @neutralinojs/neu build --release

      - name: Embed icon + version info into .exe
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: node scripts/embed-exe-icon.mjs

      - name: Bundle resources.neu into single-file .exe
        shell: bash
        run: |
          cd apps/desktop/dist/NodeTasks
          # Appending resources.neu to the .exe makes it standalone.
          # Neutralino's loader prefers a sidecar resources.neu when present
          # (which the auto-updater will write), otherwise falls back to the
          # overlay bytes we're appending here.
          cat resources.neu >> NodeTasks-win_x64.exe
          ls -la NodeTasks-win_x64.exe resources.neu

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release
          cp apps/desktop/dist/NodeTasks/NodeTasks-win_x64.exe release/
          cp apps/desktop/dist/NodeTasks/resources.neu release/
          ls -la release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: NodeTasks ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            release/NodeTasks-win_x64.exe
            release/resources.neu
