<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>NodeTasks</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div id="app">
      <div id="update-banner" class="update-banner" hidden>
        <span>Update <span id="update-version">ready</span> installed</span>
        <button id="update-restart" class="update-btn">Restart</button>
      </div>

      <header>
        <div class="header-left">
          <h1>NodeTasks</h1>
          <span class="subtitle">Node.js process monitor</span>
        </div>
        <button id="open-settings" class="icon-btn" aria-label="Settings" title="Settings">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"></path>
          </svg>
        </button>
      </header>

      <section class="summary">
        <div class="stat">
          <span class="label">Processes</span>
          <span class="value" id="stat-count">0</span>
        </div>
        <div class="stat">
          <span class="label">Total CPU</span>
          <span class="value" id="stat-cpu">—</span>
        </div>
        <div class="stat">
          <span class="label">Total RAM</span>
          <span class="value" id="stat-mem">0 B</span>
        </div>
      </section>

      <section class="list-wrapper">
        <div class="list-header">
          <div>PID</div>
          <div>CPU</div>
          <div>Memory</div>
          <div>Command</div>
        </div>
        <div id="process-list" class="list-body"></div>
        <div id="empty-state" class="empty">No Node.js processes running</div>
      </section>

      <footer>
        <span id="status" class="status">Starting…</span>
        <button id="kill-all" class="danger" disabled>Kill All</button>
      </footer>
    </div>

    <div id="settings-modal" class="modal" hidden aria-hidden="true">
      <div class="modal-backdrop" data-close></div>
      <div class="modal-card" role="dialog" aria-labelledby="settings-title" aria-modal="true">
        <div class="modal-head">
          <h2 id="settings-title">Settings</h2>
          <button class="icon-btn" data-close aria-label="Close">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>

        <div class="modal-body">
          <label class="setting-row" for="setting-autostart">
            <div class="setting-text">
              <div class="setting-title">Start with Windows</div>
              <div class="setting-desc">
                Launch NodeTasks silently to the system tray when you sign in.
              </div>
            </div>
            <span class="toggle">
              <input type="checkbox" id="setting-autostart">
              <span class="toggle-track"><span class="toggle-knob"></span></span>
            </span>
          </label>
        </div>

        <div class="modal-foot">
          <span class="modal-version" id="modal-version">v—</span>
        </div>
      </div>
    </div>

    <script src="/js/neutralino.js"></script>
    <script src="/js/main.js"></script>
  </body>
</html>
